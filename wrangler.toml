name = "guardguys-web"
main = "worker/index.ts"
compatibility_date = "2026-06-01"

# Serve the built React SPA from /dist and let the Worker handle /api/* + routing.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Phase 2: D1 backend. The Worker implements /api/* against this database.
[[d1_databases]]
binding = "DB"
database_name = "guardguys"
database_id = "e9d98c71-afde-4f86-9413-3741def77bc3"

# JWT signing secret is set as a Worker secret (not stored here):
#   echo "<random-secret>" | wrangler secret put JWT_SECRET
# For local `wrangler dev`, put JWT_SECRET in .dev.vars (gitignored).
