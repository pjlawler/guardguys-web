name = "guardguys-web"
main = "worker/index.ts"
compatibility_date = "2026-06-01"

# Serve the built React SPA from /dist and let the Worker handle /api/* + routing.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

